<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waygo Central — Dashboard</title>
  <style>
    /* ── BASE STYLES ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #eef1f8; font-family: Arial, sans-serif; min-height: 100vh; padding-bottom: 80px; }

    /* ── TOP BAR ── */
    .topbar {
      background: #0d1b3e; padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .logo-text { color: #fbbf24; font-size: 20px; font-weight: bold; }
    .live-indicator { display: flex; align-items: center; gap: 8px; color: #4a6090; font-size: 12px; }
    .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    /* ── MAP ── */
    .map-container {
      background: #d4e8d4; border-radius: 12px; height: 200px;
      position: relative; overflow: hidden; margin: 20px;
      border: 1px solid #d0d7ea;
    }
    .map-bg { position: absolute; inset: 0; background-image: linear-gradient(#b8d4b8 1px, transparent 1px), linear-gradient(90deg, #b8d4b8 1px, transparent 1px); background-size: 25px 25px; opacity: 0.5; }
    .map-driver-dot {
      position: absolute; width: 36px; height: 36px; border-radius: 50%;
      background: #0d1b3e; border: 3px solid #fbbf24;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transform: translate(-50%, -50%);
      transition: all 1s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .map-info { position: absolute; bottom: 8px; left: 8px; background: rgba(255,255,255,0.9); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: bold; }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; margin-bottom: 20px; }
    .stat-card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #d0d7ea; text-align: center; }
    .stat-number { font-size: 28px; font-weight: bold; margin-bottom: 4px; }
    .green { color: #15803d; } .orange { color: #d97706; } .blue { color: #1a56db; } .red { color: #dc2626; }
    .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; }

    /* ── BOOKINGS ── */
    .section-title { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; margin: 20px; }
    .booking-card { background: white; border-radius: 12px; padding: 16px; margin: 0 20px 10px 20px; border: 1px solid #d0d7ea; }
    .booking-card.urgent { border-color: #f97316; box-shadow: 0 0 0 3px #fed7aa; }
    .booking-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .booking-id { color: #1a56db; font-weight: bold; font-size: 13px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge-pending { background: #fef3c7; color: #d97706; }
    .badge-active { background: #dcfce7; color: #15803d; }
    .booking-customer { font-size: 14px; font-weight: 600; color: #0d1b3e; }
    .booking-route { font-size: 12px; color: #64748b; margin-top: 4px; }
    .booking-footer { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f5f9; }

    /* ── BUTTONS & NAV ── */
    .btn { padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; }
    .btn-assign { background: #1a56db; color: white; margin-top: 10px; width: 100%; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1b3e; display: flex; justify-content: space-around; padding: 12px 0; }
    .nav-item { color: #4a6090; font-size: 10px; text-decoration: none; text-align: center; }
    .nav-item.active { color: #fbbf24; }
    .nav-icon { display: block; font-size: 20px; margin-bottom: 4px; }
    .toast { position: fixed; bottom: 80px; left: 20px; right: 20px; background: #0d1b3e; color: #fbbf24; padding: 12px; border-radius: 8px; text-align: center; display: none; z-index: 1000; }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="logo-text">▲ WAYGO</span>
    <div class="live-indicator">
      <div class="live-dot"></div> LIVE
      <button onclick="logout()" style="margin-left:10px; background:none; border:1px solid #4a6090; color:#4a6090; padding:4px 8px; border-radius:4px; font-size:10px;">Logga ut</button>
    </div>
  </div>

  <div class="map-container" id="liveMap">
    <div class="map-bg"></div>
    <div class="map-info">📍 <span id="activeCount">0</span> fordon aktiva</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-number green" id="statActive">0</div><div class="stat-label">Aktiva</div></div>
    <div class="stat-card"><div class="stat-number orange" id="statPending">0</div><div class="stat-label">Väntar</div></div>
    <div class="stat-card"><div class="stat-number blue" id="statDrivers">0</div><div class="stat-label">Lediga</div></div>
    <div class="stat-card"><div class="stat-number red" id="statCancel">0</div><div class="stat-label">Problem</div></div>
  </div>

  <div class="section-title">Aktiva bokningar</div>
  <div id="bookingsList"></div>

  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active"><span class="nav-icon">📋</span>Bokningar</a>
    <a href="drivers.html" class="nav-item"><span class="nav-icon">🚖</span>Förare</a>
    <a href="#" class="nav-item"><span class="nav-icon">💬</span>Chatt</a>
    <a href="payment.html" class="nav-item"><span class="nav-icon">💳</span>Betala</a>
  </nav>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const API = 'https://16.16.153.106.sslip.io';
    const socket = io(API);

    socket.on('connect', () => {
      socket.emit('central:join');
      console.log('Connected to Live Server');
    });

    socket.on('driver:location', (data) => {
      updateDriverOnMap(data.driverId, data.lat, data.lng);
    });

    socket.on('booking:new', (data) => {
      showToast("Ny bokning inkommen!");
      loadDashboard();
    });

    function updateDriverOnMap(driverId, lat, lng) {
      const map = document.getElementById('liveMap');
      const minLat = 59.2, maxLat = 59.5, minLng = 17.8, maxLng = 18.2;
      const x = ((lng - minLng) / (maxLng - minLng)) * 90 + 5;
      const y = ((maxLat - lat) / (maxLat - minLat)) * 90 + 5;

      let dot = document.getElementById('mapDriver' + driverId);
      if (!dot) {
        dot = document.createElement('div');
        dot.id = 'mapDriver' + driverId;
        dot.className = 'map-driver-dot';
        dot.innerHTML = '🚖';
        map.appendChild(dot);
      }
      dot.style.left = x + '%';
      dot.style.top = y + '%';
      document.getElementById('activeCount').textContent = map.querySelectorAll('.map-driver-dot').length;
    }

    async function loadDashboard() {
      try {
        const [bRes, dRes] = await Promise.all([ fetch(`${API}/bookings`), fetch(`${API}/drivers`) ]);
        const bData = await bRes.json();
        const dData = await dRes.json();

        const bookings = bData.bookings || [];
        const drivers = dData.drivers || [];

        // Update Stats
        document.getElementById('statActive').textContent = bookings.filter(b => b.status === 'assigned').length;
        document.getElementById('statPending').textContent = bookings.filter(b => b.status === 'pending').length;
        document.getElementById('statDrivers').textContent = drivers.filter(d => d.status === 'available').length;
        document.getElementById('statCancel').textContent = bookings.filter(b => b.cancel_request).length;

        // Render Bookings
        const list = document.getElementById('bookingsList');
        list.innerHTML = bookings.length === 0 ? '<p style="text-align:center; color:#64748b;">Inga bokningar.</p>' : 
          bookings.map(b => `
            <div class="booking-card ${b.cancel_request ? 'urgent' : ''}">
              <div class="booking-top">
                <span class="booking-id">${b.booking_ref}</span>
                <span class="badge ${b.status === 'pending' ? 'badge-yellow' : 'badge-green'}">${b.status}</span>
              </div>
              <div class="booking-customer">${b.customer_name}</div>
              <div class="booking-route">📍 ${b.from_address} → ${b.to_address}</div>
              <div class="booking-footer">
                <span>🚖 ${b.driver_name || 'Söker förare...'}</span>
                <span class="booking-fare">${b.fare_sek} kr</span>
              </div>
              ${b.status === 'pending' ? `<button class="btn btn-assign" onclick="assignFirstAvailable('${b.id}')">Snabb-tilldela förare</button>` : ''}
            </div>
          `).join('');

      } catch (err) { console.error("Load failed", err); }
    }

    async function assignFirstAvailable(bookingId) {
      const res = await fetch(`${API}/bookings/${bookingId}/assign`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ driver_id: 1 }) // Hardcoded driver 1 for testing
      });
      if (res.ok) { showToast("Bokning tilldelad!"); loadDashboard(); }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function logout() { localStorage.removeItem('waygo_logged_in'); window.location.href = 'index.html'; }
    if (localStorage.getItem('waygo_logged_in') !== 'true') window.location.href = 'index.html';

    loadDashboard();
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
