<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,
        initial-scale=1.0">
  <title>Waygo Central — Dashboard</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#eef1f8; font-family:Arial,sans-serif; min-height:100vh; }

    .topbar {
      background:#0d1b3e; padding:16px 20px;
      display:flex; justify-content:space-between;
      align-items:center; position:sticky; top:0; z-index:100;
    }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .logo-text { color:#fbbf24; font-size:20px; font-weight:bold; }
    .live-dot {
      width:8px; height:8px; background:#22c55e;
      border-radius:50%; animation:pulse 2s infinite;
    }
    @keyframes pulse {
      0%{opacity:1} 50%{opacity:0.3} 100%{opacity:1}
    }
    .live-text { color:#4a6090; font-size:12px; }

    .page { padding:20px; }

    .stats-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:12px; margin-bottom:24px;
    }
    .stat-card {
      background:white; border-radius:12px; padding:16px;
      border:1px solid #d0d7ea; text-align:center;
    }
    .stat-number { font-size:36px; font-weight:bold; line-height:1; margin-bottom:4px; }
    .stat-label { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:1px; }
    .green{color:#15803d} .orange{color:#d97706}
    .blue{color:#1a56db} .red{color:#dc2626}

    .section-title {
      font-size:11px; font-weight:bold; color:#64748b;
      text-transform:uppercase; letter-spacing:1.5px;
      margin-bottom:10px; margin-top:20px;
    }

    .booking-card {
      background:white; border-radius:12px; padding:16px;
      margin-bottom:10px; border:1px solid #d0d7ea;
    }
    .booking-card.urgent {
      border-color:#f97316; box-shadow:0 0 0 3px #fed7aa;
    }
    .booking-top {
      display:flex; justify-content:space-between;
      align-items:center; margin-bottom:8px;
    }
    .booking-id { color:#1a56db; font-weight:bold; font-size:13px; }
    .badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:bold; }
    .badge-green { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
    .badge-yellow { background:#fef3c7; color:#d97706; border:1px solid #fde68a; }
    .badge-red { background:#fee2e2; color:#dc2626; border:1px solid #fecaca; }
    .booking-customer { font-size:14px; font-weight:600; color:#0d1b3e; margin-bottom:2px; }
    .booking-route { font-size:12px; color:#64748b; margin-bottom:8px; }
    .booking-footer { display:flex; justify-content:space-between; align-items:center; }
    .booking-driver { font-size:12px; color:#64748b; }
    .booking-fare { font-size:14px; font-weight:bold; color:#0d1b3e; }
    .actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .btn { padding:7px 14px; border-radius:8px; font-size:12px; font-weight:bold; border:none; cursor:pointer; }
    .btn-navy { background:#0d1b3e; color:#fbbf24; }
    .btn-green { background:#15803d; color:white; }
    .btn-red { background:#dc2626; color:white; }

    .loading-box { text-align:center; padding:40px 20px; color:#64748b; }
    .loading-spinner { font-size:36px; animation:spin 1s linear infinite; display:block; margin-bottom:12px; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .error-box {
      background:#fee2e2; border:1px solid #fecaca;
      border-radius:12px; padding:16px; text-align:center;
      color:#dc2626; font-size:13px; margin-bottom:16px; display:none;
    }

    .toast {
      position:fixed; bottom:90px; left:20px; right:20px;
      background:#0d1b3e; color:#fbbf24; padding:14px 20px;
      border-radius:12px; font-size:14px; font-weight:bold;
      text-align:center; z-index:300; display:none;
    }
    .toast.show { display:block; }

    /* ── LIVE MAP ── */
    .map-container {
      background:#d4e8d4; border-radius:12px; height:200px;
      position:relative; overflow:hidden; margin-bottom:20px;
      border:1px solid #d0d7ea;
    }
    .map-bg {
      position:absolute; inset:0;
      background-image:
        linear-gradient(#b8d4b8 1px, transparent 1px),
        linear-gradient(90deg, #b8d4b8 1px, transparent 1px);
      background-size:25px 25px; opacity:0.5;
    }
    .map-road-h { position:absolute; height:5px; background:white; left:0; right:0; opacity:0.8; }
    .map-road-v { position:absolute; width:5px; background:white; top:0; bottom:0; opacity:0.8; }
    .map-driver-dot {
      position:absolute; width:36px; height:36px;
      border-radius:50%; background:#0d1b3e; border:3px solid #fbbf24;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; transform:translate(-50%,-50%);
      transition:left 1s ease, top 1s ease;
      box-shadow:0 2px 8px rgba(0,0,0,0.3); cursor:pointer;
    }
    .map-driver-dot.available { background:#15803d; border-color:white; }
    .map-driver-dot.offline { background:#64748b; border-color:white; opacity:0.6; }
    .map-label-tag {
      position:absolute; background:rgba(0,0,0,0.7); color:white;
      font-size:9px; padding:2px 6px; border-radius:8px;
      white-space:nowrap; top:100%; left:50%;
      transform:translateX(-50%); margin-top:2px;
    }
    .map-info {
      position:absolute; bottom:8px; left:8px;
      background:rgba(255,255,255,0.9); border-radius:8px;
      padding:4px 10px; font-size:11px; color:#0d1b3e; font-weight:bold;
    }
    .map-live-badge {
      position:absolute; top:8px; right:8px; background:#0d1b3e;
      color:#fbbf24; border-radius:8px; padding:4px 10px;
      font-size:11px; font-weight:bold;
    }

    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0; background:#0d1b3e;
      display:flex; justify-content:space-around; padding:12px 0;
      border-top:1px solid #1a2f5e;
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center;
      gap:4px; color:#4a6090; font-size:10px;
      cursor:pointer; text-decoration:none;
    }
    .nav-item.active { color:#fbbf24; }
    .nav-icon { font-size:20px; }
    .bottom-space { height:80px; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo-text">▲ WAYGO</span>
      <div class="live-dot"></div>
      <span class="live-text">LIVE</span>
    </div>
    <button onclick="logout()"
      style="background:#1a2f5e;color:#94a3b8;
      border:none;border-radius:8px;
      padding:8px 14px;font-size:12px;cursor:pointer;">
      Logga ut
    </button>
  </div>

  <div class="page">

    <!-- LIVE MAP -->
    <div class="section-title" style="margin-top:0">
      🗺️ Live förarkarta
    </div>
    <div class="map-container" id="liveMap">
      <div class="map-bg"></div>
      <div class="map-road-h" style="top:30%"></div>
      <div class="map-road-h" style="top:60%"></div>
      <div class="map-road-v" style="left:25%"></div>
      <div class="map-road-v" style="left:55%"></div>
      <div class="map-road-v" style="left:80%"></div>
      <div class="map-info">
        📍 Live · <span id="activeCount">0</span> fordon aktiva
      </div>
      <div class="map-live-badge">⬤ LIVE</div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number green" id="statActive">—</div>
        <div class="stat-label">Aktiva resor</div>
      </div>
      <div class="stat-card">
        <div class="stat-number orange" id="statPending">—</div>
        <div class="stat-label">Väntar</div>
      </div>
      <div class="stat-card">
        <div class="stat-number blue" id="statDrivers">—</div>
        <div class="stat-label">Lediga förare</div>
      </div>
      <div class="stat-card">
        <div class="stat-number red" id="statCancel">—</div>
        <div class="stat-label">Avbokn. förfrågan</div>
      </div>
    </div>

    <!-- ERROR BOX -->
    <div class="error-box" id="errorBox">
      ⚠️ Kunde inte ansluta till servern.
    </div>

    <!-- BOOKINGS -->
    <div class="section-title">Aktiva bokningar</div>
    <div id="bookingsList">
      <div class="loading-box">
        <span class="loading-spinner">⟳</span>
        Hämtar bokningar...
      </div>
    </div>

    <div class="bottom-space"></div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon">📋</span><span>Bokningar</span>
    </a>
<a href="#" class="nav-item"
   onclick="alert('Karta kommer snart! Använd minikartan på dashboard.')">
  <span class="nav-icon">🗺️</span>
  <span>Karta</span>
</a>
    <a href="drivers.html" class="nav-item">
      <span class="nav-icon">🚖</span><span>Förare</span>
    </a>
    <a href="chat.html" class="nav-item">
      <span class="nav-icon">💬</span><span>Chatt</span>
    </a>
    <a href="payment.html" class="nav-item">
      <span class="nav-icon">💳</span><span>Betalning</span>
    </a>
  </div>

  <script>
    const API = 'https://16.16.153.106.sslip.io';

    // Check login
    if (localStorage.getItem('waygo_logged_in') !== 'true') {
      window.location.href = 'index.html';
    }

    function logout() {
      localStorage.removeItem('waygo_logged_in');
      window.location.href = 'index.html';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function getBadge(status) {
      const badges = {
        assigned: '<span class="badge badge-green">Tilldelad</span>',
        pending:  '<span class="badge badge-yellow">Väntar</span>',
        cancelled:'<span class="badge badge-red">Avbokad</span>',
      };
      return badges[status] || '<span class="badge">' + status + '</span>';
    }

    async function assignDriver(bookingId, driverId, driverName) {
      try {
        const res = await fetch(API + '/bookings/' + bookingId + '/assign', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ driver_id: driverId })
        });
        if (res.ok) {
          showToast('✓ Tilldelad till ' + driverName);
          loadDashboard();
        }
      } catch (err) {
        showToast('⚠️ Fel vid tilldelning');
      }
    }

    async function cancelBooking(id, ref) {
      if (!confirm('Avboka ' + ref + '?')) return;
      try {
        const res = await fetch(API + '/bookings/' + id + '/cancel', {
          method: 'PATCH'
        });
        if (res.ok) {
          showToast('✓ ' + ref + ' avbokad');
          loadDashboard();
        }
      } catch (err) {
        showToast('⚠️ Fel vid avbokning');
      }
    }

    function buildCard(b, drivers) {
      const isUrgent = b.cancel_request;
      const available = drivers.filter(d => d.status === 'available');
      let assignBtns = '';
      if (b.status === 'pending' && available.length > 0) {
        assignBtns = available.map(d =>
          '<button class="btn btn-green" onclick="assignDriver(' +
          b.id + ',' + d.id + ',\'' + d.name + '\')">' +
          '→ ' + d.name.split(' ')[0] + '</button>'
        ).join('');
      }
      return '<div class="booking-card' + (isUrgent ? ' urgent' : '') + '">' +
        '<div class="booking-top">' +
          '<span class="booking-id">' + b.booking_ref + '</span>' +
          getBadge(b.status) +
        '</div>' +
        '<div class="booking-customer">' + b.customer_name + '</div>' +
        '<div class="booking-route">📍 ' + b.from_address + ' → 🏁 ' + b.to_address + '</div>' +
        '<div class="booking-footer">' +
          '<span class="booking-driver">' + (b.driver_name ? '🚖 ' + b.driver_name : 'Ingen förare ännu') + '</span>' +
          '<span class="booking-fare">' + b.fare_sek + ' kr</span>' +
        '</div>' +
        '<div class="actions">' +
          assignBtns +
          (b.status !== 'cancelled' ?
            '<button class="btn btn-red" onclick="cancelBooking(' + b.id + ',\'' + b.booking_ref + '\')">✕ Avboka</button>' : '') +
          '<button class="btn btn-navy" onclick="window.location=\'chat.html\'">💬 Chatta</button>' +
        '</div>' +
      '</div>';
    }

    function addStaticDriversToMap(drivers) {
      const map = document.getElementById('liveMap');
      if (!map) return;
      const positions = [
        { x:45, y:35 },
        { x:25, y:60 },
        { x:70, y:65 },
      ];
      drivers.forEach(function(d, i) {
        if (d.status === 'offline') return;
        const pos = positions[i] || { x:50, y:50 };
        let dot = document.getElementById('mapDriver' + d.id);
        if (!dot) {
          dot = document.createElement('div');
          dot.id = 'mapDriver' + d.id;
          dot.className = 'map-driver-dot ' + d.status;
          dot.innerHTML = (d.status === 'busy' ? '🚖' : '🚕') +
            '<span class="map-label-tag">' + d.name.split(' ')[0] + '</span>';
          map.appendChild(dot);
        }
        dot.style.left = pos.x + '%';
        dot.style.top = pos.y + '%';
      });
      const active = drivers.filter(d => d.status !== 'offline').length;
      const countEl = document.getElementById('activeCount');
      if (countEl) countEl.textContent = active;
    }

    async function loadDashboard() {
      try {
        const [bRes, dRes] = await Promise.all([
          fetch(API + '/bookings'),
          fetch(API + '/drivers')
        ]);
        const bData = await bRes.json();
        const dData = await dRes.json();
        const bookings = bData.bookings;
        const drivers = dData.drivers;

        addStaticDriversToMap(drivers);

        document.getElementById('statActive').textContent =
          bookings.filter(b => b.status === 'assigned').length;
        document.getElementById('statPending').textContent =
          bookings.filter(b => b.status === 'pending').length;
        document.getElementById('statDrivers').textContent =
          drivers.filter(d => d.status === 'available').length;
        document.getElementById('statCancel').textContent =
          bookings.filter(b => b.cancel_request).length;

        const active    = bookings.filter(b => b.status === 'assigned');
        const pending   = bookings.filter(b => b.status === 'pending');
        const cancelled = bookings.filter(b => b.status === 'cancelled');

        let html = '';
        if (active.length > 0) {
          html += '<div class="section-title" style="margin-top:0">Aktiva resor</div>';
          html += active.map(b => buildCard(b, drivers)).join('');
        }
        if (pending.length > 0) {
          html += '<div class="section-title">Väntar på förare</div>';
          html += pending.map(b => buildCard(b, drivers)).join('');
        }
        if (cancelled.length > 0) {
          html += '<div class="section-title">Avbokade</div>';
          html += cancelled.map(b => buildCard(b, drivers)).join('');
        }
        if (bookings.length === 0) {
          html = '<div class="loading-box">Inga bokningar ännu</div>';
        }

        document.getElementById('bookingsList').innerHTML = html;
        document.getElementById('errorBox').style.display = 'none';

      } catch (err) {
        document.getElementById('errorBox').style.display = 'block';
        document.getElementById('bookingsList').innerHTML =
          '<div class="loading-box">Kunde inte ladda bokningar.</div>';
      }
    }

    // Socket.io
    try {
      const socket = io(API);
      socket.on('connect', function() {
        socket.emit('central:join');
      });
      socket.on('driver:location', function(data) {
        const map = document.getElementById('liveMap');
        if (!map) return;
        let dot = document.getElementById('mapDriver' + data.driverId);
        if (dot) {
          const minLat=59.2, maxLat=59.5, minLng=17.8, maxLng=18.2;
          const x = ((data.lng - minLng) / (maxLng - minLng)) * 90 + 5;
          const y = ((maxLat - data.lat) / (maxLat - minLat)) * 90 + 5;
          dot.style.left = x + '%';
          dot.style.top  = y + '%';
        }
      });
      socket.on('booking:new', function(b) {
        showToast('🚖 Ny bokning: ' + b.booking_ref);
        loadDashboard();
      });
      socket.on('booking:assigned', function() { loadDashboard(); });
      socket.on('booking:cancelled', function() { loadDashboard(); });
      socket.on('booking:cancelRequest', function(data) {
        showToast('⚠️ Avbokningsförfrågan: ' + data.customerName);
        loadDashboard();
      });
    } catch(e) {
      console.log('Socket not available: ' + e.message);
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
