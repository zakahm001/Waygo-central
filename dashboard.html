<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waygo Central — Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef1f8; font-family: sans-serif; padding-bottom: 80px; }
        .topbar { background: #0d1b3e; padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .logo { color: #fbbf24; font-weight: bold; font-size: 20px; }
        .map-container { background: #d4e8d4; height: 200px; margin: 15px; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #ccc; }
        .map-driver-dot { position: absolute; width: 30px; height: 30px; background: #0d1b3e; border: 2px solid #fbbf24; border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); transition: all 1s; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #d0d7ea; }
        .stat-num { font-size: 24px; font-weight: bold; display: block; }
        .booking-card { background: white; margin: 10px 15px; padding: 15px; border-radius: 10px; border: 1px solid #d0d7ea; }
        .urgent { border-left: 5px solid #f97316; }
        .btn { padding: 8px 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-assign { background: #22c55e; color: white; margin-right: 5px; }
        .btn-red { background: #ef4444; color: white; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0d1b3e; display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #4a6090; text-decoration: none; font-size: 12px; text-align: center; }
        .active { color: #fbbf24; }
        .toast { position: fixed; bottom: 70px; left: 10px; right: 10px; background: #333; color: white; padding: 10px; border-radius: 5px; display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo">▲ WAYGO</div>
        <button onclick="logout()" style="background:none; border:1px solid #4a6090; color:#4a6090; padding:5px; border-radius:5px;">Logga ut</button>
    </div>

    <div class="map-container" id="liveMap">
        <div style="position:absolute; bottom:10px; left:10px; font-size:12px; font-weight:bold;">📍 <span id="activeCount">0</span> aktiva bilar</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span class="stat-num" id="statActive">0</span><small>AKTIVA</small></div>
        <div class="stat-card"><span class="stat-num" id="statPending" style="color:#d97706">0</span><small>VÄNTAR</small></div>
    </div>

    <div id="bookingsList"></div>
    <div id="toast" class="toast"></div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">📋<br>Bokningar</a>
        <a href="drivers.html" class="nav-item">🚖<br>Förare</a>
        <a href="chat.html" class="nav-item">💬<br>Chatt</a>
    </nav>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const API = 'https://16.16.153.106.sslip.io';
        const socket = io(API);

        socket.on('connect', () => {
            socket.emit('central:join');
            console.log("Ansluten!");
        });

        socket.on('driver:location', (data) => {
            const map = document.getElementById('liveMap');
            let dot = document.getElementById('driver-' + data.driverId);
            if (!dot) {
                dot = document.createElement('div');
                dot.id = 'driver-' + data.driverId;
                dot.className = 'map-driver-dot';
                dot.innerHTML = '🚕';
                map.appendChild(dot);
            }
            // Enkel GPS-mappning för Stockholm
            const x = ((data.lng - 17.8) / (18.2 - 17.8)) * 100;
            const y = ((59.5 - data.lat) / (59.5 - 59.2)) * 100;
            dot.style.left = x + '%';
            dot.style.top = y + '%';
            document.getElementById('activeCount').textContent = document.querySelectorAll('.map-driver-dot').length;
        });

        socket.on('booking:new', () => { showToast("Ny bokning!"); loadDashboard(); });

        async function loadDashboard() {
            try {
                const [bRes, dRes] = await Promise.all([
                    fetch(`${API}/bookings`),
                    fetch(`${API}/drivers`)
                ]);
                const bData = await bRes.json();
                const dData = await dRes.json();
                const bookings = bData.bookings || [];
                const drivers = dData.drivers || [];

                // Uppdatera Stats
                document.getElementById('statActive').textContent = bookings.filter(b => b.status === 'assigned').length;
                document.getElementById('statPending').textContent = bookings.filter(b => b.status === 'pending').length;

                // Bygg bokningskort
                const list = document.getElementById('bookingsList');
                list.innerHTML = bookings.map(b => {
                    const available = drivers.filter(d => d.status === 'available');
                    const assignBtns = b.status === 'pending' ? available.map(d => 
                        `<button class="btn btn-assign" onclick="assign(${b.id}, ${d.id}, '${d.name}')">→ ${d.name.split(' ')[0]}</button>`
                    ).join('') : '';

                    return `
                        <div class="booking-card ${b.cancel_request ? 'urgent' : ''}">
                            <div style="display:flex; justify-content:space-between">
                                <strong>${b.booking_ref}</strong>
                                <span>${b.status}</span>
                            </div>
                            <div style="font-size:14px; margin:5px 0;">${b.customer_name}</div>
                            <div style="font-size:12px; color:#666;">${b.from_address.split(',')[0]} → ${b.to_address.split(',')[0]}</div>
                            <div>${assignBtns} <button class="btn btn-red" onclick="cancel(${b.id})">✕</button></div>
                        </div>
                    `;
                }).join('') || '<p style="text-align:center;margin-top:20px;">Inga bokningar just nu.</p>';

            } catch (err) {
                console.error("Fel vid laddning:", err);
            }
        }

        async function assign(bId, dId, name) {
            await fetch(`${API}/bookings/${bId}/assign`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ driver_id: dId })
            });
            showToast("Tilldelad till " + name);
            loadDashboard();
        }

        async function cancel(id) {
            if(confirm("Avboka?")) {
                await fetch(`${API}/bookings/${id}/cancel`, { method: 'PATCH' });
                loadDashboard();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function logout() { localStorage.removeItem('waygo_logged_in'); window.location.href = 'index.html'; }
        if (localStorage.getItem('waygo_logged_in') !== 'true') window.location.href = 'index.html';

        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
