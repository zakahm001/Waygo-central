<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waygo Central — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #eef1f8; font-family: Arial, sans-serif; min-height: 100vh; }

    /* ── TOP BAR ── */
    .topbar {
      background: #0d1b3e; padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .logo-text { color: #fbbf24; font-size: 20px; font-weight: bold; }
    .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    .live-text { color: #4a6090; font-size: 12px; }

    /* ── MAP ── */
    .map-container {
      background: #d4e8d4; border-radius: 12px; height: 200px;
      position: relative; overflow: hidden; margin: 20px; border: 1px solid #d0d7ea;
    }
    .map-bg { position: absolute; inset: 0; background-image: linear-gradient(#b8d4b8 1px, transparent 1px), linear-gradient(90deg, #b8d4b8 1px, transparent 1px); background-size: 25px 25px; opacity: 0.5; }
    .map-driver-dot {
      position: absolute; width: 36px; height: 36px; border-radius: 50%;
      background: #0d1b3e; border: 3px solid #fbbf24;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transform: translate(-50%, -50%);
      transition: all 1s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .map-label-tag { position: absolute; background: rgba(0,0,0,0.7); color: white; font-size: 9px; padding: 2px 6px; border-radius: 8px; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 2px; }
    .map-info { position: absolute; bottom: 8px; left: 8px; background: rgba(255,255,255,0.9); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: bold; }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 16px; border: 1px solid #d0d7ea; text-align: center; }
    .stat-number { font-size: 32px; font-weight: bold; margin-bottom: 4px; }
    .green { color: #15803d; } .orange { color: #d97706; } .blue { color: #1a56db; } .red { color: #dc2626; }
    .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; }

    /* ── BOOKING CARDS ── */
    .page { padding: 0 20px; }
    .section-title { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; margin: 20px 0 10px 0; }
    .booking-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; border: 1px solid #d0d7ea; }
    .booking-card.urgent { border-color: #f97316; box-shadow: 0 0 0 3px #fed7aa; }
    .booking-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .booking-id { color: #1a56db; font-weight: bold; font-size: 13px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-yellow { background: #fef3c7; color: #d97706; }
    .badge-red { background: #fee2e2; color: #dc2626; }
    .booking-customer { font-size: 14px; font-weight: 600; color: #0d1b3e; }
    .booking-route { font-size: 12px; color: #64748b; margin: 4px 0 10px 0; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .btn { padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; }
    .btn-navy { background: #0d1b3e; color: #fbbf24; }
    .btn-green { background: #15803d; color: white; }
    .btn-red { background: #dc2626; color: white; }

    /* ── UI ELEMENTS ── */
    .toast { position: fixed; bottom: 80px; left: 20px; right: 20px; background: #0d1b3e; color: #fbbf24; padding: 14px; border-radius: 12px; text-align: center; display: none; z-index: 1000; }
    .toast.show { display: block; }
    .error-box { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin: 20px; text-align: center; display: none; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1b3e; display: flex; justify-content: space-around; padding: 12px 0; }
    .nav-item { color: #4a6090; font-size: 10px; text-decoration: none; text-align: center; }
