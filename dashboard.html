<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trollhättan Cab — Central</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#eef1f8;color:#0d1b3e;min-height:100vh}
.navbar{background:#0d1b3e;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200}
.nav-logo{color:#fbbf24;font-size:16px;font-weight:bold}
.nav-live{display:flex;align-items:center;gap:6px;font-size:12px;color:#22c55e;font-weight:700}
.nav-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-user{color:#fbbf24;font-size:12px;font-weight:700}
.nav-role{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;margin-left:4px}
.r1{background:#7c3aed;color:white}.r2{background:#1a56db;color:white}.r3{background:#0d9488;color:white}
.nav-logout{color:#4a6090;font-size:12px;cursor:pointer;background:none;border:none;padding:4px 8px}
.alert-bar{padding:11px 20px;font-size:13px;font-weight:700;display:none;align-items:center;justify-content:space-between}
.alert-bar.show{display:flex}
.a-success{background:#dcfce7;color:#15803d;border-bottom:1px solid #86efac}
.a-info{background:#dbeafe;color:#1a56db;border-bottom:1px solid #93c5fd}
.a-warn{background:#fef3c7;color:#d97706;border-bottom:1px solid #fde68a}
.a-close{background:none;border:none;cursor:pointer;font-size:16px;color:inherit}
.tabbar{display:flex;background:white;border-bottom:1px solid #d0d7ea;padding:0 8px;position:sticky;top:56px;z-index:100;overflow-x:auto}
.tab{flex-shrink:0;padding:12px 10px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;border-bottom:2.5px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.tab.on{color:#0d1b3e;font-weight:700;border-bottom-color:#0d1b3e}
.page{padding:16px;padding-bottom:80px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.scard{background:white;border-radius:12px;padding:14px;border:1px solid #d0d7ea;text-align:center}
.sval{font-size:22px;font-weight:800}.slbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.card{background:white;border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid #d0d7ea}
.stitle{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.bcard{background:white;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #d0d7ea}
.bcard.pending{border-color:#d97706;box-shadow:0 0 0 3px #fef3c7}
.bcard.assigned{border-color:#1a56db;box-shadow:0 0 0 3px #dbeafe}
.bcard.completed{border-color:#15803d;box-shadow:0 0 0 3px #dcfce7}
.bcard.cancelled{opacity:.7}
.btop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.bref{font-size:13px;font-weight:700;color:#1a56db}
.broute{font-size:13px;font-weight:600;color:#0d1b3e;margin-bottom:4px}
.bdetail{font-size:11px;color:#64748b;margin-bottom:8px}
.bactions{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block}
.bp{background:#fef3c7;color:#d97706;border:1px solid #fde68a}
.ba{background:#dbeafe;color:#1a56db;border:1px solid #93c5fd}
.bc{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.bx{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.bpre{background:#ede9fe;color:#7c3aed;border:1px solid #ddd6fe}
.bblk{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
.bown{background:#fef3c7;color:#d97706;border:1px solid #fde68a}
.btn{padding:9px 14px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer}
.btn:disabled{opacity:.5;cursor:default}
.btnP{background:#0d1b3e;color:#fbbf24}
.btnS{background:#15803d;color:white}
.btnD{background:#dc2626;color:white}
.btnG{background:#f1f5f9;color:#64748b}
.btnT{background:#0d9488;color:white}
.btnB{background:#1a56db;color:white}
.btnY{background:#fbbf24;color:#0d1b3e}
.btn-sm{padding:6px 11px;font-size:12px}
.mmap{background:#d4e8d4;border-radius:10px;height:200px;position:relative;overflow:hidden;margin-bottom:14px;border:1px solid #b8d4b8}
.mmapbg{position:absolute;inset:0;background-image:linear-gradient(#b8d4b8 1px,transparent 1px),linear-gradient(90deg,#b8d4b8 1px,transparent 1px);background-size:25px 25px;opacity:.5}
.mrdh{position:absolute;height:5px;background:white;left:0;right:0;opacity:.8}
.mrdv{position:absolute;width:5px;background:white;top:0;bottom:0;opacity:.8}
.dmarker{position:absolute;width:34px;height:34px;border-radius:50%;background:#0d1b3e;border:3px solid #fbbf24;display:flex;align-items:center;justify-content:center;font-size:15px;transform:translate(-50%,-50%);transition:left 2s,top 2s}
.dlabel{position:absolute;background:#0d1b3e;color:#fbbf24;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;transform:translateX(-50%);white-space:nowrap}
.mlive{position:absolute;top:8px;left:8px;background:rgba(13,27,62,.9);color:#fbbf24;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:bold}
.dcard{background:white;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #d0d7ea;display:flex;align-items:flex-start;gap:12px}
.dcard.blocked{border-color:#dc2626;opacity:.85}
.dcard.suspended{border-color:#d97706}
.dcard.owner{border-color:#7c3aed;box-shadow:0 0 0 2px #ede9fe}
.davatar{width:44px;height:44px;border-radius:50%;background:#0d1b3e;color:#fbbf24;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;flex-shrink:0}
.ccard{background:white;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #d0d7ea;display:flex;align-items:center;gap:12px}
.ccard.blocked{border-color:#dc2626;opacity:.85}
.cavatar{width:40px;height:40px;border-radius:50%;background:#0d9488;color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;flex-shrink:0}
.savatar{width:44px;height:44px;border-radius:50%;background:#7c3aed;color:white;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;flex-shrink:0}
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;justify-content:center}
.moverlay.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.mtitle{font-size:17px;font-weight:bold;color:#0d1b3e;margin-bottom:16px}
.minfo{background:#f0f3f9;border-radius:10px;padding:12px 14px;font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.8}
.minfo strong{color:#0d1b3e}
.mbtns{display:flex;gap:10px}
.mbtn{flex:1;padding:14px;border-radius:10px;font-size:14px;font-weight:bold;border:none;cursor:pointer}
.chatbox{height:200px;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.cmsg{display:flex;gap:8px;align-items:flex-end}
.cmsg.mine{flex-direction:row-reverse}
.cav{width:28px;height:28px;border-radius:50%;background:#0d1b3e;color:#fbbf24;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0}
.cav.drv{background:#1a56db}.cav.cus{background:#0d9488}
.cbub{max-width:72%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.4}
.cmsg.mine .cbub{background:#0d1b3e;color:#fbbf24;border-radius:12px 12px 4px 12px}
.cmsg.other .cbub{background:#f1f5f9;color:#0d1b3e;border-radius:12px 12px 12px 4px}
.cinrow{display:flex;gap:8px}
.cin{flex:1;padding:9px 12px;border-radius:24px;border:1px solid #d0d7ea;background:#f8fafc;font-size:13px;color:#0d1b3e;outline:none}
.csend{width:38px;height:38px;border-radius:50%;background:#0d1b3e;border:none;color:#fbbf24;font-size:15px;cursor:pointer;flex-shrink:0}
.toast{position:fixed;top:70px;left:20px;right:20px;background:#0d1b3e;color:#fbbf24;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:bold;text-align:center;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.show{display:block}
.flabel{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block}
.finput{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #d0d7ea;background:#f8fafc;color:#0d1b3e;font-size:14px;outline:none;box-sizing:border-box;margin-bottom:10px}
.finput:focus{border-color:#0d1b3e}
select.finput{appearance:none}
.ib{border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:10px}
.ib-b{background:#dbeafe;border:1px solid #93c5fd;color:#1a56db}
.ib-r{background:#fee2e2;border:1px solid #fecaca;color:#dc2626}
.ib-y{background:#fef3c7;border:1px solid #fde68a;color:#d97706}
.ib-g{background:#dcfce7;border:1px solid #86efac;color:#15803d}
.litem{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f1f5f9}
.litem:last-child{border-bottom:none}
.profhdr{background:linear-gradient(135deg,#0d1b3e,#1a3066);border-radius:12px;padding:20px;color:white;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.big-av{width:60px;height:60px;border-radius:50%;background:#fbbf24;color:#0d1b3e;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;flex-shrink:0}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-logo">🚖 TROLLHÄTTAN CAB</div>
  <div class="nav-live"><div class="nav-dot"></div>LIVE</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="nav-user" id="navName">—</span>
    <span class="nav-role" id="navRole"></span>

  </div>
</div>

<div class="alert-bar" id="alertBar">
  <span id="alertTxt"></span>
  <button class="a-close" onclick="document.getElementById('alertBar').classList.remove('show')">✕</button>
</div>

<div class="tabbar" id="tabBar">
  <button class="tab on" id="tab0" onclick="showTab(0)">📋 Bokningar</button>
  <button class="tab" id="tab1" onclick="showTab(1)">🗺️ Karta</button>
  <button class="tab" id="tab2" onclick="showTab(2)">🚖 Förare</button>
  <button class="tab" id="tab3" onclick="showTab(3)">👤 Kunder</button>

<div id="main"></div>

<!-- ASSIGN -->

    <div class="mtitle">🚖 Tilldela förare</div>
    <div class="minfo" id="assignInfo"></div>

    <div class="mbtns">
      <button class="mbtn" style="background:#f1f5f9;color:#64748b" onclick="closeMod('cancelMod')">Avbryt</button>

<!-- DRIVER PROFILE -->

<!-- CUSTOMER PROFILE -->

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="mtitle" id="customerModTitle" style="margin-bottom:0">Kundprofil</div>
      <button onclick="closeMod('customerMod')" style="background:none;border:none;font-size:22px;cursor:pointer;color:#64748b">✕</button>
    </div>

  </div>

<!-- STAFF EDIT -->
<div class="moverlay" id="staffMod">
  <div class="mbox">
    <div class="mtitle" id="staffModTitle">Redigera personal</div>
    <input type="hidden" id="editStaffId"/>

<!-- CHANGE MY PASSWORD -->
<div class="moverlay" id="myPwdMod">

    </div>

<!-- CHAT -->
<div class="moverlay" id="chatMod">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="mtitle" id="chatTitle" style="margin-bottom:0">Chatt</div>
      <button onclick="closeMod('chatMod')" style="background:none;border:none;font-size:22px;cursor:pointer;color:#64748b">✕</button>
    </div>
    <div class="chatbox" id="chatMsgs"></div>
    <div class="cinrow">
      <input class="cin" id="chatIn" placeholder="Skriv meddelande..." onkeydown="if(event.key==='Enter')sendChat()"/>
      <button class="csend" onclick="sendChat()">➤</button>
    </div>
  </div>

<div class="toast" id="toast"></div>

<script>
var API = 'https://16.16.153.106.sslip.io';
var allBookings = [], allDrivers = [], allCustomers = [], allStaff = [];
var curTab = 0, socket = null, driverPos = {}, refreshTimer = null;
var staffUser = null, staffToken = null;
var assignId = null, assignRef = null, cancelId = null, cancelRef = null;
var chatKey = null;
var driverPositions = {};

function closeMod(id){try{document.getElementById(id).classList.remove('open');}catch(e){}}
function closeMIfOut(e,id){if(e.target===document.getElementById(id))closeMod(id);}

function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},3500);
}

function showAlert(msg,type){
  var bar=document.getElementById('alertBar'),txt=document.getElementById('alertTxt');
  if(!bar||!txt)return;
  bar.className='alert-bar show a-'+(type||'info');
  txt.textContent=msg;setTimeout(function(){bar.classList.remove('show');},8000);
}

// ── LOGIN ──
function checkAuth(){
  var sv=localStorage.getItem('thtcab_staff');
  var st=localStorage.getItem('thtcab_staff_token');
  if(sv&&st){
    try{staffUser=JSON.parse(sv);staffToken=st;updateNav();return true;}catch(e){}
  }
  showLogin();return false;
}

function showLogin(){
  document.getElementById('main').innerHTML=
    '<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:20px">'+
    '<div style="background:white;border-radius:16px;padding:32px 24px;width:100%;max-width:400px;border:1px solid #d0d7ea">'+
    '<div style="text-align:center;margin-bottom:24px">'+
    '<div style="font-size:44px">🚖</div>'+
    '<div style="font-size:20px;font-weight:bold;color:#0d1b3e;margin-top:8px">Trollhättan Cab</div>'+
    '<div style="color:#64748b;font-size:13px;margin-top:4px">Central Dispatch · Admin Portal</div></div>'+
    '<label class="flabel">E-postadress</label>'+
    '<input class="finput" id="lEmail" type="email" placeholder="din@trollhattancab.com"/>'+
    '<label class="flabel">Lösenord</label>'+
    '<input class="finput" id="lPwd" type="password" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')doLogin()"/>'+
    '<div class="ib ib-r" id="lErr" style="display:none"></div>'+
    '<button class="btn btnP" style="width:100%;padding:14px" id="lBtn" onclick="doLogin()">Logga in →</button>'+
    '<div style="text-align:center;margin-top:16px;font-size:11px;color:#94a3b8">Trollhättan Cab AB · Org.nr 559312-7128</div>'+
    '</div></div>';
}

async function doLogin(){
  var email=document.getElementById('lEmail').value.trim();
  var pwd=document.getElementById('lPwd').value.trim();
  var err=document.getElementById('lErr');
  var btn=document.getElementById('lBtn');
  if(!email||!pwd){err.textContent='⚠️ Fyll i e-post och lösenord';err.style.display='';return;}
  btn.textContent='Loggar in...';btn.disabled=true;err.style.display='none';
  try{
    var res=await fetch(API+'/staff/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pwd})});
    var data=await res.json();
    if(data.token){
      staffUser=data.staff;staffToken=data.token;
      localStorage.setItem('thtcab_staff',JSON.stringify(staffUser));
      localStorage.setItem('thtcab_staff_token',staffToken);
      updateNav();init();
    }else{err.textContent='⚠️ '+(data.error||'Fel uppgifter');err.style.display='';}
  }catch(e){err.textContent='⚠️ Kunde inte ansluta';err.style.display='';}
  btn.textContent='Logga in →';btn.disabled=false;
}

function logout(){
  localStorage.removeItem('thtcab_staff');localStorage.removeItem('thtcab_staff_token');
  staffUser=null;staffToken=null;
  if(refreshTimer)clearInterval(refreshTimer);
  if(socket)socket.disconnect();
  showLogin();
}

function updateNav(){
  if(!staffUser)return;
  document.getElementById('navName').textContent=staffUser.name;
  var labels={superadmin:'Super Admin',admin:'Admin',dispatcher:'Dispatcher'};
  var classes={superadmin:'r1',admin:'r2',dispatcher:'r3'};
  var roleEl=document.getElementById('navRole');
  roleEl.textContent=labels[staffUser.role]||staffUser.role;
  roleEl.className='nav-role '+(classes[staffUser.role]||'r3');
  var t5=document.getElementById('tab5');
  if(t5)t5.style.display=(staffUser.level<=2)?'':'none';
}

window.onload=function(){if(checkAuth())init();};

async function init(){
  await loadData();connectSocket();showTab(0);
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(async function(){await loadData();showTab(curTab);},15000);
}

async function loadData(){
  try{
    var r1=await fetch(API+'/bookings');var r2=await fetch(API+'/drivers');
    var d1=await r1.json();var d2=await r2.json();
    allBookings=d1.bookings||[];allDrivers=d2.drivers||[];
    if(staffToken&&staffUser&&staffUser.level<=2){
      try{
        var r3=await fetch(API+'/customers',{headers:{'Authorization':'Bearer '+staffToken}});
        var r4=await fetch(API+'/staff',{headers:{'Authorization':'Bearer '+staffToken}});
        var d3=await r3.json();var d4=await r4.json();
        allCustomers=d3.customers||[];allStaff=d4.staff||[];
      }catch(e){}
    }
  }catch(e){console.log('Load error:',e);}
}

function connectSocket(){
  try{
    socket=io(API,{timeout:5000});
    socket.on('connect',function(){socket.emit('central:join');});
    socket.on('booking:new',function(b){
      allBookings.unshift(b);
      showAlert('🚨 Ny bokning! '+b.booking_ref+' · '+b.from_address,'warn');
      showToast('🚨 '+b.booking_ref);
      if(curTab===0)showTab(0);
    });
    socket.on('booking:assigned',function(b){
      allBookings=allBookings.map(function(x){return x.id===b.id?Object.assign({},x,b):x;});
      if(curTab===0)showTab(0);
    });
    socket.on('booking:completed',function(b){
      allBookings=allBookings.map(function(x){return x.id===b.id?Object.assign({},x,b,{status:'completed'}):x;});
      allDrivers=allDrivers.map(function(d){return d.id===b.driver_id?Object.assign({},d,{status:'available'}):d;});
      showAlert('✅ Avslutad — '+b.booking_ref+' · '+(b.fare_sek||0)+' kr','success');
      if(curTab===0)showTab(0);
    });
    socket.on('booking:cancelled',function(data){
      allBookings=allBookings.map(function(b){return b.id===data.id?Object.assign({},b,{status:'cancelled',driver_id:null,driver_name:null}):b;});
      if(curTab===0)showTab(0);
    });
    socket.on('driver:location',function(data){
      driverPositions[data.driverId]={lat:data.lat,lng:data.lng};
      updateMarker(data.driverId,data.lat,data.lng);
    });
    socket.on('driver:status',function(data){
      allDrivers=allDrivers.map(function(d){return d.id===data.driverId?Object.assign({},d,{status:data.status}):d;});
      if(curTab===2)showTab(2);
    });
  }catch(e){console.log('Socket error:',e);}
}

function showTab(i){
  try{
    curTab=i;
    document.querySelectorAll('.tab').forEach(function(t,j){t.classList.toggle('on',i===j);});
    var m=document.getElementById('main');if(!m)return;
    if(i===0)m.innerHTML=tabBookings();
    else if(i===1)m.innerHTML=tabMap();
    else if(i===2)m.innerHTML=tabDrivers();
    else if(i===3)m.innerHTML=tabCustomers();
    else if(i===4)m.innerHTML=tabChat();
    else if(i===5)m.innerHTML=tabStaff();
  }catch(e){console.log('showTab error:',e);}
}

// ── BOOKINGS ──
function tabBookings(){
  var pending=allBookings.filter(function(b){return b.status==='pending';});
  var active=allBookings.filter(function(b){return b.status==='assigned';});
  var completed=allBookings.filter(function(b){return b.status==='completed';});
  var cancelled=allBookings.filter(function(b){return b.status==='cancelled';});
  var earnings=completed.reduce(function(s,b){return s+(b.fare_sek||0);},0);
  var h='<div class="page">';
  h+='<div class="stats">';
  h+=sc(active.length,'Aktiva','#1a56db')+sc(pending.length,'Väntar','#d97706');
  h+=sc(allDrivers.filter(function(d){return d.status==='available';}).length,'Lediga förare','#15803d');
  h+=sc(earnings+' kr','Intäkter idag','#7c3aed');
  h+='</div>';
  if(pending.length)h+='<div class="stitle">🔴 Väntar ('+pending.length+')</div>'+pending.map(bcard).join('');
  if(active.length)h+='<div class="stitle">🔵 Aktiva ('+active.length+')</div>'+active.map(bcard).join('');
  if(completed.length)h+='<div class="stitle">✅ Avslutade ('+completed.length+')</div>'+completed.slice(0,10).map(bcard).join('');
  if(cancelled.length)h+='<div class="stitle">❌ Avbokade ('+cancelled.length+')</div>'+cancelled.slice(0,5).map(bcard).join('');
  if(!allBookings.length)h+='<div class="empty">📋<br>Inga bokningar ännu</div>';
  h+='<div style="height:80px"></div></div>';
  return h;
}

function sc(val,lbl,color){return '<div class="scard"><div class="sval" style="color:'+color+'">'+val+'</div><div class="slbl">'+lbl+'</div></div>';}

function getBadge(s){
  if(s==='pending')return '<span class="badge bp">Väntar</span>';
  if(s==='assigned')return '<span class="badge ba">Tilldelad</span>';
  if(s==='completed')return '<span class="badge bc">Avslutad</span>';
  if(s==='cancelled')return '<span class="badge bx">Avbokad</span>';
  return '<span class="badge bx">'+s+'</span>';
}

function bcard(b){
  var isPre=b.booking_type==='pre';
  var cls='bcard '+(b.status==='pending'?'pending':b.status==='assigned'?'assigned':b.status==='completed'?'completed':'cancelled');
  var actions='';
  if(b.status==='pending'){
    actions='<button class="btn btnP btn-sm" onclick="openAssign('+b.id+',\''+b.booking_ref+'\')">Tilldela förare</button>'+
      '<button class="btn btnD btn-sm" onclick="openCancel('+b.id+',\''+b.booking_ref+'\')">Avboka</button>';
  }else if(b.status==='assigned'){
    actions='<button class="btn btnB btn-sm" onclick="openChat(\'central-driver-'+b.driver_id+'\',\'Förare: '+(b.driver_name||'')+'\')">💬 Förare</button>'+
      '<button class="btn btnT btn-sm" onclick="openChat(\'customer-central-'+b.id+'\',\'Kund: '+b.customer_name+'\')">💬 Kund</button>'+
      '<button class="btn btnD btn-sm" onclick="openCancel('+b.id+',\''+b.booking_ref+'\')">Avboka</button>';
  }else if(b.status==='completed'){
    actions='<button class="btn btnG btn-sm" onclick="showToast(\'📄 '+b.booking_ref+' · '+(b.fare_sek||0)+' kr\')">📄 Kvitto</button>';
  }
  return '<div class="'+cls+'">'+
    '<div class="btop"><span class="bref">'+b.booking_ref+'</span>'+
    '<div style="display:flex;gap:4px">'+(isPre?'<span class="badge bpre">📅 Förbokning</span>':'')+getBadge(b.status)+'</div></div>'+
    (isPre&&b.scheduled_at?'<div style="font-size:11px;color:#7c3aed;font-weight:700;margin-bottom:4px">📅 '+new Date(b.scheduled_at).toLocaleString('sv-SE',{dateStyle:'medium',timeStyle:'short'})+'</div>':'')+
    '<div class="broute">📍 '+b.from_address+' → 🏁 '+b.to_address+'</div>'+
    '<div class="bdetail">👤 '+b.customer_name+' · '+(b.customer_phone||'')+'<br>'+(b.driver_name?'🚖 '+b.driver_name+' · ':'')+b.fare_sek+' kr · '+b.payment_method+'<br>🕐 '+new Date(b.created_at).toLocaleString('sv-SE',{dateStyle:'short',timeStyle:'short'})+'</div>'+
    (actions?'<div class="bactions">'+actions+'</div>':'')+
    '</div>';
}

function tabMap(){
  var avail=allDrivers.filter(function(d){return d.status!=='offline';});
  var h='<div class="page"><div class="mmap" id="liveMap">'+
    '<div class="mmapbg"></div>'+
    '<div class="mrdh" style="top:30%"></div><div class="mrdh" style="top:55%"></div><div class="mrdh" style="top:75%"></div>'+
    '<div class="mrdv" style="left:25%"></div><div class="mrdv" style="left:50%"></div><div class="mrdv" style="left:75%"></div>'+
    '<div class="mlive">🔴 Live · '+avail.length+' fordon</div>';
  avail.forEach(function(d,i){
    var pos=driverPositions[d.id];
    var x=pos?Math.min(85,Math.max(15,((pos.lng-17.8)/(18.2-17.8))*80+10)):(20+i*25);
    var y=pos?Math.min(85,Math.max(15,((59.5-pos.lat)/(59.5-59.2))*80+10)):(30+i*20);
    var color=d.status==='available'?'#22c55e':d.status==='busy'?'#f97316':'#64748b';
    h+='<div class="dmarker" id="dmarker-'+d.id+'" style="left:'+x+'%;top:'+y+'%;border-color:'+color+'">🚖</div>'+
      '<div class="dlabel" id="dlabel-'+d.id+'" style="left:'+x+'%;top:calc('+y+'% + 22px)">'+d.name.split(' ')[0]+'</div>';
  });
  h+='</div><div class="stitle">'+avail.length+' aktiva fordon</div>';
  avail.forEach(function(d){
    var color=d.status==='available'?'#22c55e':d.status==='busy'?'#f97316':'#64748b';
    var st=d.status==='available'?'Ledig':d.status==='busy'?'På uppdrag':'Offline';
    h+='<div class="dcard" style="align-items:center"><div class="davatar">'+d.name.charAt(0)+'</div>'+
      '<div style="flex:1"><div style="font-size:14px;font-weight:700">'+d.name+'</div>'+
      '<div style="font-size:12px;color:#64748b">'+d.plate+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:'+color+'"></div>'+
      '<span style="font-size:12px;color:#64748b">'+st+'</span></div></div>';
  });
  h+='<div style="height:80px"></div></div>';
  return h;
}

function updateMarker(id,lat,lng){
  var m=document.getElementById('dmarker-'+id);var l=document.getElementById('dlabel-'+id);if(!m)return;
  var x=Math.min(85,Math.max(15,((lng-17.8)/(18.2-17.8))*80+10));
  var y=Math.min(85,Math.max(15,((59.5-lat)/(59.5-59.2))*80+10));
  m.style.left=x+'%';m.style.top=y+'%';if(l){l.style.left=x+'%';l.style.top='calc('+y+'% + 22px)';}
}

async function addDriver(){
  var name=document.getElementById('dnName').value.trim();
  var email=document.getElementById('dnEmail').value.trim();
  var phone=document.getElementById('dnPhone').value.trim();
  var plate=document.getElementById('dnPlate').value.trim();
  var taxi=document.getElementById('dnTaxi').value.trim();
  var city=document.getElementById('dnCity').value.trim();
  var pwd=document.getElementById('dnPwd').value.trim();
  var err=document.getElementById('dnErr');
  var btn=document.getElementById('addDrvBtn');
  if(!name||!email||!phone||!plate||!pwd){err.textContent='⚠️ Fyll i alla obligatoriska fält';err.style.display='';return;}
  btn.textContent='Lägger till...';btn.disabled=true;err.style.display='none';
  try{
    var res=await fetch(API+'/drivers/add',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+staffToken},body:JSON.stringify({name:name,email:email,phone:phone,plate:plate,taxi_nr:taxi,city:city,password:pwd})});
    var data=await res.json();
    if(data.driver){allDrivers.push(data.driver);showToast('✅ '+name+' tillagd!');showTab(2);}
    else{err.textContent='⚠️ '+(data.error||'Fel');err.style.display='';}
  }catch(e){err.textContent='⚠️ Nätverksfel';err.style.display='';}
  btn.textContent='Lägg till förare →';btn.disabled=false;
}

async function manageDriver(id,action,extra){
  try{
    var body=Object.assign({action:action},extra||{});
    var res=await fetch(API+'/drivers/'+id+'/manage',{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+staffToken},body:JSON.stringify(body)});
    var data=await res.json();
    if(data.driver){
      allDrivers=allDrivers.map(function(d){return d.id===id?Object.assign({},d,data.driver):d;});
      showToast('✅ Åtgärd genomförd');closeMod('driverMod');openDriverProfile(id);
    }else{showToast('⚠️ '+(data.error||'Fel'));}
  }catch(e){showToast('⚠️ Nätverksfel');}
}

async function setOwner(id){
  var share=parseInt(document.getElementById('ownerShareInput').value)||0;
  await manageDriver(id,'set_owner',{owner_share:share});
}

async function openSuspend(id){
  var until=prompt('Avstängd till vilket datum? (ÅÅÅÅ-MM-DD)');if(!until)return;
  var reason=prompt('Anledning:')||'';
  await manageDriver(id,'suspend',{suspend_until:until+'T23:59:00',reason:reason});
}

async function updateDriver(id){
  var name=document.getElementById('eDrvName').value.trim();
  var phone=document.getElementById('eDrvPhone').value.trim();
  var plate=document.getElementById('eDrvPlate').value.trim();
  var taxi=document.getElementById('eDrvTaxi').value.trim();
  var city=document.getElementById('eDrvCity').value.trim();
  var pwd=document.getElementById('eDrvPwd').value.trim();
  await manageDriver(id,'update',{name:name,phone:phone,plate:plate,taxi_nr:taxi,city:city,password:pwd||undefined});
}

    '<div class="big-av" style="background:#0d1b3e;color:#fbbf24">'+c.name.charAt(0)+'</div>'+
    '<div><div style="font-size:18px;font-weight:bold">'+c.name+'</div>'+
    '<div style="color:#a7f3d0;font-size:13px;margin-top:2px">'+c.email+'</div>'+
    '<div style="margin-top:8px;display:flex;gap:6px">'+
    '<span class="badge '+(c.customer_type==='business'?'ba':'bx')+'">'+(c.customer_type==='business'?'🏢 Företag':'👤 Privat')+'</span>'+
    (c.blocked?'<span class="badge bblk">🔴 Blockerad</span>':'')+
    '</div></div></div>';
  h+='<div class="card"><div class="stitle">Kontaktuppgifter</div>'+
    '<div class="litem"><span style="font-size:13px;color:#64748b">Telefon</span><span style="font-size:13px">'+c.phone+'</span></div>'+
    '<div class="litem"><span style="font-size:13px;color:#64748b">E-post</span><span style="font-size:13px">'+c.email+'</span></div>'+
    '<div class="litem"><span style="font-size:13px;color:#64748b">Kund sedan</span><span style="font-size:13px">'+new Date(c.created_at).toLocaleDateString('sv-SE')+'</span></div>'+
    (c.blocked&&c.block_reason?'<div class="ib ib-r" style="margin-top:8px">Anledning: '+c.block_reason+'</div>':'')+
    '</div>';
  h+='<div class="card"><div class="stitle">Åtgärder</div>'+
    '<div class="agrid">'+
    (c.blocked?
      '<button class="btn btnS" onclick="manageCustomer('+c.id+',\'unblock\')">✅ Avblockera</button>':
      '<button class="btn btnD" onclick="blockCustomer('+c.id+')">🔴 Blockera</button>')+
    '<button class="btn btnP" onclick="resetCustomerPwd('+c.id+')">🔑 Återställ lösenord</button>'+
    '</div></div>';
  document.getElementById('customerModContent').innerHTML=h;
}

async function manageCustomer(id,action,extra){
  try{
    var body=Object.assign({action:action},extra||{});
    var res=await fetch(API+'/customers/'+id+'/manage',{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+staffToken},body:JSON.stringify(body)});
    var data=await res.json();
    if(data.customer){
      allCustomers=allCustomers.map(function(c){return c.id===id?Object.assign({},c,data.customer):c;});
      showToast('✅ Åtgärd genomförd');closeMod('customerMod');
    }else{showToast('⚠️ '+(data.error||'Fel'));}
  }catch(e){showToast('⚠️ Nätverksfel');}
}

async function blockCustomer(id){
  var reason=prompt('Anledning till blockering (valfri):')||'';
  await manageCustomer(id,'block',{reason:reason});
}

async function resetCustomerPwd(id){
  var pwd=prompt('Ange nytt lösenord för kunden:');
  if(!pwd||pwd.length<6){showToast('⚠️ Lösenord minst 6 tecken');return;}
  await manageCustomer(id,'reset_password',{new_password:pwd});
  showToast('✅ Lösenord återställt');closeMod('customerMod');
}

// ── CHAT ──
function tabChat(){
  var activeBooks=allBookings.filter(function(b){return b.status==='assigned';});
  var h='<div class="page"><div class="stitle">Chatta med förare</div>';
  allDrivers.forEach(function(d){
    h+='<div class="dcard" style="cursor:pointer;align-items:center" onclick="openChat(\'central-driver-'+d.id+'\',\''+d.name+'\')">'+
      '<div class="davatar" style="background:#7c3aed">💬</div>'+
      '<div><div style="font-size:14px;font-weight:700;color:#0d1b3e">'+d.name+'</div>'+
      '<div style="font-size:12px;color:#64748b">'+d.plate+'</div></div>'+
      '<div style="margin-left:auto;color:#94a3b8;font-size:20px">›</div></div>';
  });
  if(activeBooks.length){
    h+='<div class="stitle" style="margin-top:8px">Chatta med kunder</div>';
    activeBooks.forEach(function(b){
      h+='<div class="dcard" style="cursor:pointer;align-items:center" onclick="openChat(\'customer-central-'+b.id+'\',\''+b.customer_name+'\')">'+
        '<div class="davatar" style="background:#0d9488">👤</div>'+
        '<div><div style="font-size:14px;font-weight:700;color:#0d1b3e">'+b.customer_name+'</div>'+
        '<div style="font-size:12px;color:#64748b">'+b.booking_ref+' · '+b.customer_phone+'</div></div>'+
        '<div style="margin-left:auto;color:#94a3b8;font-size:20px">›</div></div>';
    });
  }
  h+='<div style="height:80px"></div></div>';
  return h;
}

// ── STAFF ──
function tabStaff(){
  if(!staffUser||staffUser.level>2)return '<div class="page"><div class="ib ib-r">⚠️ Åtkomst nekad</div></div>';
  var canAddAdmin=staffUser.level===1;
  var h='<div class="page">';

  h+='<div class="card"><div class="stitle">Mitt konto</div>'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'+
    '<div class="savatar">'+staffUser.name.charAt(0)+'</div>'+
    '<div style="flex:1"><div style="font-size:15px;font-weight:700;color:#0d1b3e">'+staffUser.name+'</div>'+
    '<div style="font-size:12px;color:#64748b">'+staffUser.email+'</div>'+
    '<div style="font-size:12px;color:#7c3aed;font-weight:700;margin-top:4px">'+(staffUser.role==='superadmin'?'👑 Super Admin':staffUser.role==='admin'?'🔑 Admin':'🎧 Dispatcher')+'</div></div>'+
    '<button class="btn btnG btn-sm" onclick="document.getElementById(\'myPwdMod\').classList.add(\'open\')">🔒 Ändra lösenord</button>'+
    '</div></div>';

  h+='<div class="card"><div class="stitle">➕ Lägg till personal</div>'+
    '<input class="finput" id="sName" placeholder="Fullständigt namn *"/>'+
    '<input class="finput" id="sEmail" type="email" placeholder="E-post *"/>'+
    '<input class="finput" id="sPwd" type="password" placeholder="Lösenord *"/>'+
    '<label class="flabel">Roll</label>'+
    '<select class="finput" id="sRole">'+
    '<option value="dispatcher">Dispatcher — kan hantera bokningar</option>'+
    (canAddAdmin?'<option value="admin">Admin — kan hantera förare och kunder</option>':'')+
    '</select>'+
    '<div class="ib ib-r" id="sErr" style="display:none"></div>'+
    '<button class="btn btnP" id="addStaffBtn" onclick="addStaff()">Lägg till →</button></div>';

  h+='<div class="stitle">All personal ('+allStaff.length+')</div>';
  allStaff.forEach(function(s){
    var roleLabel=s.role==='superadmin'?'👑 Super Admin':s.role==='admin'?'🔑 Admin':'🎧 Dispatcher';
    var roleColor=s.role==='superadmin'?'#7c3aed':s.role==='admin'?'#1a56db':'#0d9488';
    var canEdit=staffUser.level===1||(staffUser.level===2&&s.level===3);
    var canDelete=s.id!==staffUser.id&&s.level>1&&(staffUser.level===1||(staffUser.level===2&&s.level===3));
    h+='<div class="card" style="padding:14px">'+
      '<div style="display:flex;align-items:center;gap:12px">'+
      '<div class="savatar" style="background:'+roleColor+'">'+s.name.charAt(0)+'</div>'+
      '<div style="flex:1"><div style="font-size:14px;font-weight:700;color:#0d1b3e">'+s.name+'</div>'+
      '<div style="font-size:12px;color:#64748b">'+s.email+'</div>'+
      '<div style="font-size:12px;color:'+roleColor+';font-weight:700;margin-top:3px">'+roleLabel+'</div></div>'+
      '<div style="display:flex;flex-direction:column;gap:6px">'+
      (canEdit?'<button class="btn btnG btn-sm" onclick="openStaffEdit('+s.id+',\''+s.name+'\',\''+s.email+'\',\''+s.role+'\')">✏️</button>':'')+
      (canDelete?'<button class="btn btnD btn-sm" onclick="deleteStaff('+s.id+',\''+s.name+'\')">🗑</button>':'')+
      '</div></div></div>';
  });
  h+='<div style="height:80px"></div></div>';
  return h;
}

async function addStaff(){
  var name=document.getElementById('sName').value.trim();
  var email=document.getElementById('sEmail').value.trim();
  var pwd=document.getElementById('sPwd').value.trim();
  var role=document.getElementById('sRole').value;
  var err=document.getElementById('sErr');var btn=document.getElementById('addStaffBtn');
  if(!name||!email||!pwd){err.textContent='⚠️ Fyll i alla fält';err.style.display='';return;}
  btn.textContent='Lägger till...';btn.disabled=true;err.style.display='none';
  try{
    var res=await fetch(API+'/staff/add',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+staffToken},body:JSON.stringify({name:name,email:email,password:pwd,role:role})});
    var data=await res.json();
    if(data.staff){allStaff.push(data.staff);showToast('✅ '+name+' tillagd!');showTab(5);}
    else{err.textContent='⚠️ '+(data.error||'Fel');err.style.display='';}
  }catch(e){err.textContent='⚠️ Nätverksfel';err.style.display='';}
  btn.textContent='Lägg till →';btn.disabled=false;
}

function openStaffEdit(id,name,email,role){
  document.getElementById('editStaffId').value=id;
  document.getElementById('editStaffName').value=name;
  document.getElementById('editStaffEmail').value=email;
  document.getElementById('editStaffRole').value=role;
  document.getElementById('editStaffPwd').value='';
  document.getElementById('staffModErr').style.display='none';
  document.getElementById('staffModTitle').textContent='Redigera: '+name;
  document.getElementById('staffMod').classList.add('open');
}

async function saveStaffEdit(){
  var id=document.getElementById('editStaffId').value;
  var name=document.getElementById('editStaffName').value.trim();
  var email=document.getElementById('editStaffEmail').value.trim();
  var role=document.getElementById('editStaffRole').value;
  var pwd=document.getElementById('editStaffPwd').value.trim();
  var err=document.getElementById('staffModErr');err.style.display='none';
  try{
    var body={name:name,email:email,role:role};if(pwd)body.password=pwd;
    var res=await fetch(API+'/staff/'+id,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+staffToken},body:JSON.stringify(body)});
    var data=await res.json();
    if(data.staff){
      allStaff=allStaff.map(function(s){return s.id===parseInt(id)?data.staff:s;});
      closeMod('staffMod');showToast('✅ '+name+' uppdaterad!');showTab(5);
    }else{err.textContent='⚠️ '+(data.error||'Fel');err.style.display='';}
  }catch(e){err.textContent='⚠️ Nätverksfel';err.style.display='';}
}

async function deleteStaff(id,name){
  if(!confirm('Ta bort '+name+'?'))return;
  try{
    var res=await fetch(API+'/staff/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+staffToken}});
    if(res.ok){allStaff=allStaff.filter(function(s){return s.id!==id;});showToast('✓ '+name+' borttagen');showTab(5);}
  }catch(e){showToast('⚠️ Nätverksfel');}
}

async function doChangeMyPwd(){
  var cur=document.getElementById('myCur').value.trim();
  var nw=document.getElementById('myNew').value.trim();
  var conf=document.getElementById('myConf').value.trim();
  var err=document.getElementById('myPwdErr');err.style.display='none';
  if(!cur||!nw||!conf){err.textContent='⚠️ Fyll i alla fält';err.style.display='';return;}
  if(nw!==conf){err.textContent='⚠️ Lösenorden matchar inte';err.style.display='';return;}
  if(nw.length<6){err.textContent='⚠️ Minst 6 tecken';err.style.display='';return;}
  try{
    var res=await fetch(API+'/staff/change-password',{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+staffToken},body:JSON.stringify({current_password:cur,new_password:nw})});
    var data=await res.json();
    if(data.success){closeMod('myPwdMod');showToast('✅ Lösenord ändrat!');}
    else{err.textContent='⚠️ '+(data.error||'Fel');err.style.display='';}
  }catch(e){err.textContent='⚠️ Nätverksfel';err.style.display='';}
}

// ── ASSIGN ──
function openAssign(id,ref){
  assignId=id;assignRef=ref;
  var b=allBookings.find(function(x){return x.id===id;});
  var info=document.getElementById('assignInfo');
  if(info)info.innerHTML='<strong>Bokning:</strong> '+ref+'<br><strong>Från:</strong> '+(b?b.from_address:'')+'<br><strong>Till:</strong> '+(b?b.to_address:'');
  var available=allDrivers.filter(function(d){return d.status==='available'&&!d.blocked;});
  var listEl=document.getElementById('assignList');
  if(listEl){
    if(!available.length){listEl.innerHTML='<div class="ib ib-y">⚠️ Inga lediga förare.</div>';}
    else{
      listEl.innerHTML=available.map(function(d){
        return '<div class="dcard" style="cursor:pointer;margin-bottom:8px;align-items:center" onclick="doAssign('+d.id+',\''+d.name+'\')">'+
          '<div class="davatar">'+d.name.charAt(0)+'</div>'+
          '<div style="flex:1"><div style="font-size:14px;font-weight:700;color:#0d1b3e">'+d.name+'</div>'+
          '<div style="font-size:12px;color:#64748b">'+d.plate+' · ⭐ '+(d.rating||'—')+'</div></div>'+
          '<div style="color:#15803d;font-size:12px;font-weight:700">✓ Ledig</div></div>';
      }).join('');
    }
  }
  document.getElementById('assignMod').classList.add('open');
}

async function doAssign(driverId,driverName){
  closeMod('assignMod');
  try{
    var res=await fetch(API+'/bookings/'+assignId+'/assign',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({driver_id:driverId})});
    if(res.ok){
      allBookings=allBookings.map(function(b){return b.id===assignId?Object.assign({},b,{status:'assigned',driver_id:driverId,driver_name:driverName}):b;});
      allDrivers=allDrivers.map(function(d){return d.id===driverId?Object.assign({},d,{status:'busy'}):d;});
      showAlert('✅ '+assignRef+' tilldelad till '+driverName,'success');
      showToast('✅ Tilldelad: '+driverName);showTab(0);
    }else{showToast('⚠️ Kunde inte tilldela');}
  }catch(e){showToast('⚠️ Nätverksfel');}
}

// ── CANCEL ──
function openCancel(id,ref){
  cancelId=id;cancelRef=ref;
  var b=allBookings.find(function(x){return x.id===id;});
  var info=document.getElementById('cancelInfo');
  if(info)info.innerHTML='<strong>Bokning:</strong> '+ref+'<br><strong>Kund:</strong> '+(b?b.customer_name:'')+'<br><strong>Förare:</strong> '+(b&&b.driver_name?b.driver_name:'Ingen');
  document.getElementById('cancelMod').classList.add('open');
}

async function doCancel(){
  closeMod('cancelMod');
  try{
    var res=await fetch(API+'/bookings/'+cancelId+'/cancel',{method:'PATCH'});
    if(res.ok){
      var b=allBookings.find(function(x){return x.id===cancelId;});
      if(b&&b.driver_id)allDrivers=allDrivers.map(function(d){return d.id===b.driver_id?Object.assign({},d,{status:'available'}):d;});
      allBookings=allBookings.map(function(x){return x.id===cancelId?Object.assign({},x,{status:'cancelled',driver_id:null,driver_name:null}):x;});
      showAlert('Bokning '+cancelRef+' avbokad','info');
      showToast('✓ '+cancelRef+' avbokad');showTab(0);
    }
  }catch(e){showToast('⚠️ Nätverksfel');}
}

// ── CHAT ──
function openChat(key,name){
  chatKey=key;
  document.getElementById('chatTitle').textContent='💬 '+name;
  document.getElementById('chatMsgs').innerHTML='<div style="text-align:center;color:#94a3b8;font-size:12px;padding:20px">Laddar...</div>';
  document.getElementById('chatMod').classList.add('open');
  loadChat(key);
}

async function loadChat(key){
  try{
    var res=await fetch(API+'/messages/'+key);var data=await res.json();var msgs=data.messages||[];
    var el=document.getElementById('chatMsgs');
    if(!msgs.length){el.innerHTML='<div style="text-align:center;color:#94a3b8;font-size:12px;padding:20px">Inga meddelanden</div>';return;}
    el.innerHTML=msgs.map(function(m){
      var mine=m.sender_role==='central';
      var avCls=m.sender_role==='driver'?'drv':m.sender_role==='customer'?'cus':'';
      return '<div class="cmsg '+(mine?'mine':'other')+'">'+
        '<div class="cav '+avCls+'">'+(m.sender_name?m.sender_name.charAt(0):'?')+'</div>'+
        '<div style="max-width:72%"><div style="font-size:10px;color:#94a3b8;margin-bottom:2px;text-align:'+(mine?'right':'left')+'">'+m.sender_name+'</div>'+
        '<div class="cbub">'+m.content+'</div></div></div>';
    }).join('');
    el.scrollTop=el.scrollHeight;
  }catch(e){document.getElementById('chatMsgs').innerHTML='<div style="text-align:center;color:#dc2626;font-size:12px;padding:20px">Kunde inte ladda</div>';}
}

async function sendChat(){
  var input=document.getElementById('chatIn');var text=input?input.value.trim():'';
  if(!text||!chatKey)return;
  var el=document.getElementById('chatMsgs');
  var div=document.createElement('div');div.className='cmsg mine';
  div.innerHTML='<div class="cav">C</div><div style="max-width:72%"><div style="font-size:10px;color:#94a3b8;margin-bottom:2px;text-align:right">'+(staffUser?staffUser.name:'Central')+'</div><div class="cbub">'+text+'</div></div>';
  el.appendChild(div);el.scrollTop=el.scrollHeight;if(input)input.value='';
  try{
    await fetch(API+'/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({thread_key:chatKey,sender_name:staffUser?staffUser.name:'Central Dispatch',sender_role:'central',content:text})});
  }catch(e){}
}
</script>
